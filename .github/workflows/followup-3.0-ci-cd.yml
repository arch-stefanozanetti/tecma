# FollowUp 3.0: CI — build e test FE + BE (nessun deploy da Actions).
# Deploy: Render — vedi business/tecma-digital-platform/followup-3.0/docs/RENDER_DEPLOY.md e render.yaml in root.
name: Followup 3.0 CI

on:
  push:
    branches: [develop, demo, main]
    paths:
      - "business/tecma-digital-platform/followup-3.0/fe-followup-v3/**"
      - "business/tecma-digital-platform/followup-3.0/be-followup-v3/**"
      - "business/tecma-digital-platform/design-system/**"
      - "render.yaml"
      - ".github/workflows/followup-3.0-ci-cd.yml"
  pull_request:
    branches: [develop, demo, main]
    paths:
      - "business/tecma-digital-platform/followup-3.0/fe-followup-v3/**"
      - "business/tecma-digital-platform/followup-3.0/be-followup-v3/**"
      - "business/tecma-digital-platform/design-system/**"
      - "render.yaml"
      - ".github/workflows/followup-3.0-ci-cd.yml"

concurrency:
  group: followup-3.0-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FOLLOWUP_FE_DIR: business/tecma-digital-platform/followup-3.0/fe-followup-v3
  FOLLOWUP_BE_DIR: business/tecma-digital-platform/followup-3.0/be-followup-v3

jobs:
  ci:
    name: Build & Test FE + BE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node (FE)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ${{ env.FOLLOWUP_FE_DIR }}/pnpm-lock.yaml

      - name: Install dependencies (FE)
        working-directory: ${{ env.FOLLOWUP_FE_DIR }}
        env:
          # Evita warning .npmrc "Failed to replace env in config" (install usa file:../../design-system)
          NPM_TECMA_TOKEN: ${{ secrets.NPM_TECMA_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Run tests (FE)
        working-directory: ${{ env.FOLLOWUP_FE_DIR }}
        run: pnpm run test:run

      - name: Build (FE)
        working-directory: ${{ env.FOLLOWUP_FE_DIR }}
        run: pnpm run build

      - name: Install dependencies (BE)
        working-directory: ${{ env.FOLLOWUP_BE_DIR }}
        run: npm ci

      - name: Run tests (BE)
        working-directory: ${{ env.FOLLOWUP_BE_DIR }}
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DB_NAME: followup_ci_test
        run: npm run test

      - name: Build (BE)
        working-directory: ${{ env.FOLLOWUP_BE_DIR }}
        run: npm run build
