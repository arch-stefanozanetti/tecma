# Render Blueprint: FollowUp 3.0 (BE + FE)
# Dashboard → New → Blueprint → collega repo tecma; imposta env (sync: false) prima del primo deploy.
# Dopo deploy BE, imposta su FE: VITE_API_BASE_URL = URL del servizio BE (es. https://followup-3-be.onrender.com)
version: "1"
services:
  - type: web
    name: followup-3-be
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: business/tecma-digital-platform/followup-3.0/be-followup-v3
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_JWT_EXPIRES_IN
        value: 15m
      - key: AUTH_REFRESH_EXPIRES_DAYS
        value: "7"
      # Storage asset/branding (logo, email header, immagini): vedi RENDER_DEPLOY §3.1. Aggiungi in Dashboard anche AWS_* se serve.
      - key: ASSETS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: eu-west-1

  # Static: niente `region` né `plan` nel Blueprint (Render non li accetta su static).
  - type: web
    name: followup-3-fe
    runtime: static
    rootDir: business/tecma-digital-platform/followup-3.0/fe-followup-v3
    # pnpm + tree pulito: evita cache node_modules cross-OS e bug npm optional (Rollup Linux).
    # Compila design-system (dist/ non è in git) prima del FE; jiti/Tailwind risolvono ./tailwind anche in contesto require.
    buildCommand: cd ../../design-system && npm ci && npm run build && cd ../followup-3.0/fe-followup-v3 && rm -rf node_modules && corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && pnpm run build
    # Relativo a rootDir (non alla root del repo): altrimenti Render cerca un path inesistente.
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_DATA_MODE
        value: rest
