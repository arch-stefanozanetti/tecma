# Esegue build Storybook + test-runner sul package design-system.
# La copia in /tmp evita che Jest segnali snapshot "obsolete" di altri package nel monorepo.
name: Storybook (design-system)

on:
  push:
    paths:
      - "design-system/**"
      - ".github/workflows/storybook-design-system.yml"
  pull_request:
    paths:
      - "design-system/**"
      - ".github/workflows/storybook-design-system.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Isola package e test Storybook
        run: |
          cp -a design-system /tmp/tecma-design-system
          cd /tmp/tecma-design-system
          npm ci
          npx playwright install chromium
          node scripts/storybook-test-ci-prep.mjs
          npm run test-storybook:ci
