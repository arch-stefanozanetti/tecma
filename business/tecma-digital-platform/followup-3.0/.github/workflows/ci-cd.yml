# CI/CD: build + test su develop/demo/main; deploy auto su dev/demo, deploy manuale su prod
name: CI/CD

on:
  push:
    branches: [develop, demo, main]
    paths:
      - "fe-followup-v3/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [develop, demo, main]
    paths:
      - "fe-followup-v3/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente da deployare (solo per branch main)"
        required: true
        default: "prod"
        type: choice
        options:
          - prod

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_WORKING_DIR: fe-followup-v3

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe-followup-v3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fe-followup-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  deploy-dev:
    name: Deploy Dev
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Dev)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ${{ env.VERCEL_WORKING_DIR }}
          vercel-args: "--no-prod"

  deploy-demo:
    name: Deploy Demo
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/demo'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Demo)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ${{ env.VERCEL_WORKING_DIR }}
          vercel-args: "--no-prod"

  deploy-prod:
    name: Deploy Production
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ${{ env.VERCEL_WORKING_DIR }}
          vercel-args: "--prod"
