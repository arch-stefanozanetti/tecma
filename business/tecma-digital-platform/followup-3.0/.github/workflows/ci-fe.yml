name: CI FE Core Strict

on:
  push:
    paths:
      - "fe-followup-v3/**"
      - "scripts/check-no-secrets.sh"
      - ".github/workflows/ci-fe.yml"
  pull_request:
    paths:
      - "fe-followup-v3/**"
      - "scripts/check-no-secrets.sh"
      - ".github/workflows/ci-fe.yml"

jobs:
  fe-core-strict:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe-followup-v3
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (tracked files)
        working-directory: .
        run: bash scripts/check-no-secrets.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - run: pnpm install --frozen-lockfile
      - name: pnpm audit dipendenze runtime (high+, bloccante)
        run: pnpm audit --prod --audit-level=high
      - name: pnpm audit albero completo (informativo)
        continue-on-error: true
        run: pnpm audit --audit-level=high
      - run: pnpm run check:panels
      - run: pnpm run check:detail-architecture
      - run: pnpm run test:panels
      - run: pnpm run test:lint:core
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run check:bundle-budget
      - run: pnpm run test:coverage:core

  fe-e2e-core:
    runs-on: ubuntu-latest
    needs: fe-core-strict
    defaults:
      run:
        working-directory: fe-followup-v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: E2E (core + entitlements, un solo avvio webServer)
        run: pnpm run test:e2e:ci
        env:
          PLAYWRIGHT_USE_WEBSERVER: "true"
          PLAYWRIGHT_WEBSERVER_COMMAND: "pnpm run dev -- --host 127.0.0.1 --port 5177"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:5177"
          # Opzionali: se tutte valorizzate, gira lo smoke API reale in e2e/entitlements.spec.ts (altrimenti skipped).
          E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
          E2E_JWT: ${{ secrets.E2E_JWT }}
          E2E_ENTITLEMENTS_TEST_WORKSPACE_ID: ${{ secrets.E2E_ENTITLEMENTS_TEST_WORKSPACE_ID }}

  lighthouse-pwa:
    runs-on: ubuntu-latest
    needs: fe-core-strict
    defaults:
      run:
        working-directory: fe-followup-v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Start preview server
        run: pnpm run preview &
      - name: Wait for preview
        run: npx wait-on http://127.0.0.1:4173 -t 30000
      - name: Lighthouse PWA audit
        run: pnpm run check:lighthouse-pwa http://127.0.0.1:4173
