{
  "openapi": "3.0.3",
  "info": {
    "title": "Followup 3.0 REST API",
    "version": "1.0.0",
    "description": "API REST per Followup 3.0 (CRM multi-progetto). Gestione clienti, appartamenti, trattative (rent/sell), calendario, workspaces, progetti, audit e report. Autenticazione JWT (login, refresh). In locale il backend è su porta 8080."
  },
  "servers": [
    {
      "url": "http://localhost:8080/v1",
      "description": "Backend locale (dev)"
    },
    {
      "url": "/v1",
      "description": "Stesso host (proxy)"
    }
  ],
  "tags": [
    {
      "name": "health",
      "description": "Stato del servizio"
    },
    {
      "name": "auth",
      "description": "Login, refresh, logout, SSO, reset password, invito"
    },
    {
      "name": "users",
      "description": "Utenti e inviti (RBAC)"
    },
    {
      "name": "rbac",
      "description": "Ruoli workspace, catalogo permessi e anteprima permessi effettivi (UI amministrazione)"
    },
    {
      "name": "session",
      "description": "Progetti per email, preferenze utente"
    },
    {
      "name": "clients",
      "description": "Clienti (query, CRUD, azioni)"
    },
    {
      "name": "apartments",
      "description": "Appartamenti e listing"
    },
    {
      "name": "requests",
      "description": "Trattative rent/sell, transizioni, azioni"
    },
    {
      "name": "calendar",
      "description": "Eventi calendario"
    },
    {
      "name": "workspaces",
      "description": "Workspace e progetti associati"
    },
    {
      "name": "projects",
      "description": "Configurazione progetti (policies, email, PDF)"
    },
    {
      "name": "audit",
      "description": "Log audit e eventi per entità"
    },
    {
      "name": "reports",
      "description": "Report pipeline, clienti, appartamenti"
    },
    {
      "name": "platform",
      "description": "Platform API riusabili per consumer esterni via API key"
    },
    {
      "name": "realtime",
      "description": "Realtime stream (SSE) con envelope versionato"
    },
    {
      "name": "portal",
      "description": "Customer portal via magic link"
    },
    {
      "name": "privacy",
      "description": "GDPR: consensi, export, erase, retention"
    },
    {
      "name": "contracts",
      "description": "Firma digitale e tracking contratti"
    },
    {
      "name": "marketing",
      "description": "Workflow marketing multi-step"
    },
    {
      "name": "mls",
      "description": "Feed MLS/portali immobiliari e reconciliation"
    },
    {
      "name": "scale-out",
      "description": "Decision gate per eventuale estrazione microservizi"
    },
    {
      "name": "ops",
      "description": "Alerting operativo e acknowledgement"
    },
    {
      "name": "Riusabili",
      "description": "API per uso esterno (listings, integrazioni)"
    },
    {
      "name": "hc",
      "description": "Home Config (appartamenti HC)"
    },
    {
      "name": "associations",
      "description": "Associazioni appartamento-cliente"
    },
    {
      "name": "workflows",
      "description": "Complete flow preview/execute"
    },
    {
      "name": "webhooks",
      "description": "Configurazione webhook outbound per workspace"
    },
    {
      "name": "assets",
      "description": "File asset workspace (immagini, documenti, planimetrie, branding)"
    },
    {
      "name": "hc-master",
      "description": "Entità master HC"
    },
    {
      "name": "templates",
      "description": "Template configurazione progetto"
    },
    {
      "name": "ai",
      "description": "Suggerimenti AI e action drafts"
    }
  ],
  "paths": {
    "/health": {
      "get": {
        "tags": [
          "health"
        ],
        "summary": "Healthcheck",
        "responses": {
          "200": {
            "description": "Service healthy"
          }
        }
      }
    },
    "/auth/login": {
      "post": {
        "tags": [
          "auth"
        ],
        "summary": "Login con email e password",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "email",
                  "password"
                ],
                "properties": {
                  "email": {
                    "type": "string",
                    "format": "email",
                    "example": "user@example.com"
                  },
                  "password": {
                    "type": "string",
                    "format": "password"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Restituisce accessToken, refreshToken, user",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "accessToken": {
                      "type": "string"
                    },
                    "refreshToken": {
                      "type": "string"
                    },
                    "user": {
                      "type": "object",
                      "properties": {
                        "id": {
                          "type": "string"
                        },
                        "email": {
                          "type": "string"
                        },
                        "role": {
                          "type": "string"
                        },
                        "isAdmin": {
                          "type": "boolean"
                        },
                        "permissions": {
                          "type": "array",
                          "items": {
                            "type": "string"
                          }
                        },
                        "projectId": {
                          "type": "string",
                          "nullable": true
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "Credenziali non valide"
          }
        }
      }
    },
    "/auth/sso-exchange": {
      "post": {
        "tags": [
          "auth"
        ],
        "summary": "Exchange SSO JWT for access and refresh tokens",
        "requestBody": {
          "required": true
        },
        "responses": {
          "200": {
            "description": "Returns accessToken, refreshToken, user"
          },
          "401": {
            "description": "Invalid SSO token or user not found"
          }
        }
      }
    },
    "/auth/refresh": {
      "post": {
        "tags": [
          "auth"
        ],
        "summary": "Refresh access token using refresh token",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "refreshToken"
                ],
                "properties": {
                  "refreshToken": {
                    "type": "string"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Returns new accessToken and refreshToken"
          },
          "401": {
            "description": "Invalid or expired refresh token"
          }
        }
      }
    },
    "/auth/logout": {
      "post": {
        "tags": [
          "auth"
        ],
        "summary": "Logout and invalidate refresh session",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "refreshToken"
                ],
                "properties": {
                  "refreshToken": {
                    "type": "string"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "204": {
            "description": "Session invalidated"
          },
          "400": {
            "description": "Validation error"
          }
        }
      }
    },
    "/auth/request-password-reset": {
      "post": {
        "tags": [
          "auth"
        ],
        "operationId": "requestPasswordReset",
        "summary": "Richiedi email di reset password (risposta generica anche se email assente)",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "email"
                ],
                "properties": {
                  "email": {
                    "type": "string",
                    "format": "email"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "{ ok: true }"
          },
          "400": {
            "description": "Validazione"
          }
        }
      }
    },
    "/auth/reset-password": {
      "post": {
        "tags": [
          "auth"
        ],
        "operationId": "resetPassword",
        "summary": "Reimposta password con token da email",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "token",
                  "password"
                ],
                "properties": {
                  "token": {
                    "type": "string"
                  },
                  "password": {
                    "type": "string",
                    "minLength": 8
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "{ ok: true }"
          },
          "400": {
            "description": "Token non valido"
          }
        }
      }
    },
    "/auth/set-password-from-invite": {
      "post": {
        "tags": [
          "auth"
        ],
        "operationId": "setPasswordFromInvite",
        "summary": "Attiva account da link invito",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "token",
                  "password"
                ],
                "properties": {
                  "token": {
                    "type": "string"
                  },
                  "password": {
                    "type": "string",
                    "minLength": 8
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "accessToken, refreshToken, user (come login)"
          },
          "400": {
            "description": "Token non valido"
          }
        }
      }
    },
    "/public/listings": {
      "post": {
        "tags": [
          "apartments",
          "Riusabili"
        ],
        "summary": "Public listings (no JWT). Rate limited by IP (60 req/min). Same contract as POST /apartments/query.",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "workspaceId",
                  "projectIds"
                ],
                "properties": {
                  "workspaceId": {
                    "type": "string"
                  },
                  "projectIds": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  },
                  "page": {
                    "type": "integer",
                    "minimum": 1,
                    "default": 1
                  },
                  "perPage": {
                    "type": "integer",
                    "minimum": 1,
                    "maximum": 200,
                    "default": 25
                  },
                  "searchText": {
                    "type": "string"
                  },
                  "sort": {
                    "type": "object",
                    "properties": {
                      "field": {
                        "type": "string"
                      },
                      "direction": {
                        "type": "integer",
                        "enum": [
                          1,
                          -1
                        ]
                      }
                    }
                  },
                  "filters": {
                    "type": "object"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Paginated apartments (listings)"
          },
          "400": {
            "description": "Validation error"
          },
          "429": {
            "description": "Rate limit exceeded"
          }
        }
      }
    },
    "/auth/me": {
      "get": {
        "tags": [
          "auth"
        ],
        "operationId": "getAuthMe",
        "summary": "Utente corrente da JWT",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "id, email, role, isAdmin, permissions, projectId",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "id": {
                      "type": "string"
                    },
                    "email": {
                      "type": "string"
                    },
                    "role": {
                      "type": "string",
                      "nullable": true
                    },
                    "isAdmin": {
                      "type": "boolean"
                    },
                    "permissions": {
                      "type": "array",
                      "items": {
                        "type": "string"
                      }
                    },
                    "projectId": {
                      "type": "string",
                      "nullable": true
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid token"
          }
        }
      }
    },
    "/workspace-roles": {
      "get": {
        "tags": ["rbac"],
        "operationId": "listWorkspaceRoles",
        "summary": "Elenco ruoli membership workspace con label",
        "description": "Fonte tz_roleDefinitions / fallback; autenticazione JWT richiesta.",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "Lista ruoli in data",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "data": {
                      "type": "array",
                      "description": "Ruoli ordinati (owner, admin, collaborator, viewer)",
                      "items": {
                        "type": "object",
                        "properties": {
                          "roleKey": {
                            "type": "string",
                            "description": "Chiave ruolo normalizzata",
                            "example": "collaborator"
                          },
                          "label": {
                            "type": "string",
                            "description": "Etichetta per select UI",
                            "example": "Collaborator"
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "401": { "description": "Non autenticato" },
          "500": { "description": "Errore server" }
        }
      }
    },
    "/rbac/permission-catalog": {
      "get": {
        "tags": ["rbac", "users"],
        "operationId": "getRbacPermissionCatalog",
        "summary": "Catalogo permessi (moduli e azioni) per matrice override",
        "description": "Richiede permesso users.read.",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "Gruppi modulo × permessi in data",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "data": {
                      "type": "object",
                      "description": "Struttura allineata a buildPermissionCatalog()",
                      "properties": {
                        "groups": {
                          "type": "array",
                          "items": {
                            "type": "object",
                            "properties": {
                              "module": { "type": "string", "description": "Id modulo" },
                              "label": { "type": "string", "description": "Etichetta modulo" },
                              "permissions": {
                                "type": "array",
                                "items": {
                                  "type": "object",
                                  "properties": {
                                    "id": { "type": "string", "description": "Id permesso es. clients.read" },
                                    "label": { "type": "string" },
                                    "action": { "type": "string" }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "401": { "description": "Non autenticato" },
          "403": { "description": "Permesso users.read richiesto" },
          "500": { "description": "Errore server" }
        }
      }
    },
    "/rbac/roles/{roleKey}/effective-permissions": {
      "get": {
        "tags": ["rbac", "users"],
        "operationId": "getRbacRoleEffectivePermissions",
        "summary": "Permessi effettivi per ruolo workspace (DB + builtin)",
        "description": "Anteprima per wizard utenti; richiede users.read. Se il ruolo ha accesso completo, permissions contiene \"*\".",
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          {
            "name": "roleKey",
            "in": "path",
            "required": true,
            "description": "Chiave ruolo workspace",
            "schema": { "type": "string" },
            "example": "collaborator"
          }
        ],
        "responses": {
          "200": {
            "description": "roleKey e elenco permessi risolti",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "data": {
                      "type": "object",
                      "properties": {
                        "roleKey": { "type": "string", "description": "Ruolo richiesto" },
                        "permissions": {
                          "type": "array",
                          "description": "Permessi effettivi o [\"*\"] se tutti",
                          "items": { "type": "string" }
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "400": { "description": "roleKey mancante o non valido" },
          "401": { "description": "Non autenticato" },
          "403": { "description": "Permesso users.read richiesto" },
          "500": { "description": "Errore server" }
        }
      }
    },
    "/users": {
      "get": {
        "tags": [
          "users"
        ],
        "operationId": "listUsersWithVisibility",
        "summary": "Lista utenti e visibilità (permesso users.read)",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "{ users: [...] }"
          },
          "401": {},
          "403": {}
        }
      },
      "post": {
        "tags": [
          "users"
        ],
        "operationId": "inviteUser",
        "summary": "Invita utente (email + ruolo + progetto)",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "email",
                  "role",
                  "projectId"
                ],
                "properties": {
                  "email": {
                    "type": "string",
                    "format": "email"
                  },
                  "role": {
                    "type": "string"
                  },
                  "projectId": {
                    "type": "string"
                  },
                  "projectName": {
                    "type": "string"
                  },
                  "appPublicUrl": {
                    "type": "string",
                    "format": "uri",
                    "description": "Base URL FE per link invito; se omesso si usa Origin o APP_PUBLIC_URL"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "{ userId }"
          },
          "403": {},
          "409": {
            "description": "Email già registrata"
          },
          "502": {
            "description": "Invio email fallito"
          },
          "503": {
            "description": "SMTP non configurato"
          }
        }
      }
    },
    "/users/{id}": {
      "parameters": [
        {
          "name": "id",
          "in": "path",
          "required": true,
          "schema": {
            "type": "string"
          }
        }
      ],
      "patch": {
        "tags": [
          "users"
        ],
        "operationId": "patchUser",
        "summary": "Aggiorna utente (users.update)",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "role": {
                    "type": "string"
                  },
                  "status": {
                    "type": "string",
                    "enum": [
                      "invited",
                      "active",
                      "disabled"
                    ]
                  },
                  "permissions_override": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  },
                  "isDisabled": {
                    "type": "boolean"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {},
          "404": {}
        }
      },
      "delete": {
        "tags": [
          "users"
        ],
        "operationId": "deleteUser",
        "summary": "Elimina utente da tz_users (users.delete)",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {},
          "404": {}
        }
      }
    },
    "/admin/email-flows": {
      "get": {
        "tags": [
          "admin"
        ],
        "operationId": "listEmailFlows",
        "summary": "Template email transazionali (email_flows.manage)",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Lista flussi"
          },
          "403": {}
        }
      }
    },
    "/admin/email-flows/{flowKey}": {
      "parameters": [
        {
          "name": "flowKey",
          "in": "path",
          "required": true,
          "schema": {
            "type": "string"
          }
        }
      ],
      "get": {
        "tags": [
          "admin"
        ],
        "operationId": "getEmailFlow",
        "summary": "Dettaglio flusso email",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {},
          "403": {},
          "404": {}
        }
      },
      "put": {
        "tags": [
          "admin"
        ],
        "operationId": "putEmailFlow",
        "summary": "Salva template: editorMode html (bodyHtml) o blocks (layout → HTML sanitizzato)",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "oneOf": [
                  {
                    "type": "object",
                    "required": [
                      "enabled",
                      "subject",
                      "editorMode",
                      "bodyHtml"
                    ],
                    "properties": {
                      "enabled": {
                        "type": "boolean"
                      },
                      "subject": {
                        "type": "string"
                      },
                      "editorMode": {
                        "type": "string",
                        "enum": [
                          "html"
                        ]
                      },
                      "bodyHtml": {
                        "type": "string"
                      }
                    }
                  },
                  {
                    "type": "object",
                    "required": [
                      "enabled",
                      "subject",
                      "editorMode",
                      "layout"
                    ],
                    "properties": {
                      "enabled": {
                        "type": "boolean"
                      },
                      "subject": {
                        "type": "string"
                      },
                      "editorMode": {
                        "type": "string",
                        "enum": [
                          "blocks"
                        ]
                      },
                      "layout": {
                        "type": "object"
                      }
                    }
                  }
                ]
              }
            }
          }
        },
        "responses": {
          "200": {},
          "400": {},
          "403": {}
        }
      }
    },
    "/admin/email-flows/upload-asset": {
      "post": {
        "tags": [
          "admin"
        ],
        "summary": "Upload immagine per email (multipart field: file); richiede EMAIL_FLOW_S3_BUCKET",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {},
          "400": {},
          "403": {}
        }
      }
    },
    "/admin/email-flows/{flowKey}/suggested": {
      "parameters": [
        {
          "name": "flowKey",
          "in": "path",
          "required": true,
          "schema": {
            "type": "string"
          }
        }
      ],
      "get": {
        "tags": [
          "admin"
        ],
        "summary": "Template HTML suggerito con placeholder",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {},
          "403": {}
        }
      }
    },
    "/admin/email-flows/{flowKey}/preview": {
      "parameters": [
        {
          "name": "flowKey",
