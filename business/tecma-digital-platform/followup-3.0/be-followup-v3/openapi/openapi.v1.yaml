  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "JWT access token from login or refresh"
      },
      "apiKeyAuth": {
        "type": "apiKey",
        "in": "header",
        "name": "x-api-key",
        "description": "Platform consumer API key (scoped by workspace/project)."
      }
    },
    "schemas": {
      "Pagination": {
        "type": "object",
        "properties": {
          "page": {
            "type": "integer"
          },
          "perPage": {
            "type": "integer"
          },
          "total": {
            "type": "integer"
          },
          "totalPages": {
            "type": "integer"
          }
        }
      },
      "RequestRow": {
        "type": "object",
        "required": [
          "_id",
          "projectId",
          "workspaceId",
          "clientId",
          "type",
          "status",
          "createdAt",
          "updatedAt"
        ],
        "properties": {
          "_id": {
            "type": "string"
          },
          "projectId": {
            "type": "string"
          },
          "workspaceId": {
            "type": "string"
          },
          "clientId": {
            "type": "string"
          },
          "apartmentId": {
            "type": "string",
            "nullable": true
          },
          "type": {
            "type": "string",
            "enum": [
              "rent",
              "sell"
            ]
          },
          "status": {
            "type": "string",
            "enum": [
              "new",
              "contacted",
              "viewing",
              "quote",
              "offer",
              "won",
              "lost"
            ]
          },
          "createdAt": {
            "type": "string",
            "format": "date-time"
          },
          "updatedAt": {
            "type": "string",
            "format": "date-time"
          },
          "quoteId": {
            "type": "string",
            "description": "Riferimento a tz_quotes"
          },
          "quoteStatus": {
            "type": "string"
          },
          "quoteNumber": {
            "type": "string"
          },
          "quoteExpiryOn": {
            "type": "string",
            "format": "date-time"
          },
          "quoteTotalPrice": {
            "type": "number"
          }
        }
      },
      "ClientRow": {
        "type": "object",
        "properties": {
          "_id": {
            "type": "string"
          },
          "workspaceId": {
            "type": "string"
          },
          "projectId": {
            "type": "string"
          },
          "firstName": {
            "type": "string"
          },
          "lastName": {
            "type": "string"
          },
          "fullName": {
            "type": "string",
            "description": "Nome completo derivato (nome + cognome) o legacy."
          },
          "email": {
            "type": "string"
          },
          "phone": {
            "type": "string"
          },
          "status": {
            "type": "string"
          },
          "createdAt": {
            "type": "string",
            "format": "date-time"
          },
          "updatedAt": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "ApartmentRow": {
        "type": "object",
        "properties": {
          "_id": {
            "type": "string"
          },
          "workspaceId": {
            "type": "string"
          },
          "projectId": {
            "type": "string"
          },
          "code": {
            "type": "string"
          },
          "title": {
            "type": "string"
          },
          "status": {
            "type": "string"
          },
