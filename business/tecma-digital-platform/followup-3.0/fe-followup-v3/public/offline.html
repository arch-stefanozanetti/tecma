<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline — Followup 3.0</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 1rem;
        text-align: center;
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
      button {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        background: #0f172a;
        color: #fff;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <h1>Sei offline</h1>
    <p>La connessione non è disponibile. Riprova quando la rete torna disponibile.</p>
    <button type="button" onclick="window.location.reload()">Riprova</button>
  </body>
</html>
