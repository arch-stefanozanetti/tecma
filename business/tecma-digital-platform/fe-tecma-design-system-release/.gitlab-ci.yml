workflow:
  rules:
    - if: $CI_COMMIT_BRANCH

variables:
  NPM_TOKEN: ${CI_JOB_TOKEN}
  NPM_CONFIG_REGISTRY: "${CI_API_V4_URL}/projects/155/packages/npm/"


# Templates
.job_template: &exclusions
  except:
    changes:
      - README.md

.job_template: &update_image
  stage: release
  variables:
    TAG: $CI_COMMIT_SHORT_SHA
    UP_CI_COMMIT_BRANCH: $CI_COMMIT_BRANCH
    UP_CI_PROJECT_NAME: $CI_PROJECT_NAME

#####################################
# Stages
#
stages:
  - test
  - analysis
  - update
  - release
  - build_library
  - semantic_release

unit_test:
  stage: test
  image: node:14-alpine
  tags:
    - dockerimages
  script:
    - yarn install --pure-lockfile
    - yarn run test:coverage
  retry: 1
  artifacts:
    when: always
    # Save coverage for 1 week
    paths:
      - $CI_PROJECT_DIR/coverage
    expire_in: 1 day
    # Show coverage in gitlab
    # https://docs.gitlab.com/ee/ci/unit_test_reports.html#mocha
    # https://docs.gitlab.com/ee/user/project/merge_requests/test_coverage_visualization.html
    reports:
      junit:
        - $CI_PROJECT_DIR/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: $CI_PROJECT_DIR/coverage/cobertura-*.xml

  <<: *exclusions
  allow_failure: true
  only:
    - merge_requests


sonarqube:
  stage: analysis
  tags:
    - dockerimages
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: ['']
  dependencies:
    - unit_test
  variables:
    SONAR_USER_HOME: '${CI_PROJECT_DIR}/.sonar' # Defines the location of the analysis task cache
    GIT_DEPTH: '0' # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: '${CI_JOB_NAME}'
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  <<: *exclusions
  allow_failure: true
  only:
    - merge_requests


build_image:
  stage: update
  tags:
    - dockerimages
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: ['']
  script:
    - echo "{\"auths\":{\"$OCIR_CI_REGISTRY\":{\"username\":\"$OCIR_CI_NAMESPACE/$OCIR_CI_REGISTRY_PUSH_USER\",\"password\":\"$(echo $OCIR_CI_REGISTRY_PUSH_PASSWORD|base64 -d)\"}}}" > /kaniko/.docker/config.json
    - IMAGE=$OCIR_CI_REGISTRY/$OCIR_CI_NAMESPACE/dev/$CI_PROJECT_NAME
    - TAG=$CI_COMMIT_SHORT_SHA
    - DESTINATION=$IMAGE:$TAG
    - echo $DESTINATION
    - /kaniko/executor --cache=true --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $DESTINATION --build-arg OCIR_CI_REGISTRY=$OCIR_CI_REGISTRY --build-arg OCIR_CI_NAMESPACE=$OCIR_CI_NAMESPACE
  <<: *exclusions
  allow_failure: false
  only:
    - /^biz-.*$/


update-image-biz-tecma-dev1:
  <<: *update_image
  trigger:
    project: business/tecma-digital-platform/helm-tecma
    branch: biz-tecma-dev1
  only:
    - /^biz-.*$/

release_library:
  image: registry.gitlab.com/ujlbu4/gitlab-semantic-release
  stage: semantic_release
  dependencies:
    - build_library
  tags:
    - dockerimages
  script:
    - npx semantic-release
  except:
    refs:
      - tags
    variables:
      - $CI_COMMIT_TITLE =~ /chore\(release\).*$/
  only:
    - release


build_library:
  stage: build_library
  image: $OCIR_CI_REGISTRY/$OCIR_CI_NAMESPACE/dev/node:18.20-buster
  tags:
    - dockerimages
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
  artifacts:
    paths:
      - lib/
  script:
    - yarn install --pure-lockfile
    - yarn build
  rules:
    - if: $CI_COMMIT_TAG #do not run if commit tag
      when: never
    - if: $CI_COMMIT_TITLE =~ /chore\(release\).*$/
      when: never
    - if: $CI_COMMIT_BRANCH == "release"
